<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Graiphic GO Whitepapers documentation and PDF library hosted on GitHub Pages.">
  <title>Graiphic GO Whitepapers</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #0f766e;
      --body-bg: #f8fafc;
      --body-color: #1f2937;
      --sidebar-width: 320px;
      --sidebar-border-color: #dbe4ee;
      --heading-color: #0f172a;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 32%),
        radial-gradient(circle at top right, rgba(234, 88, 12, 0.08), transparent 24%),
        #f8fafc;
    }

    .sidebar {
      border-right: 1px solid var(--sidebar-border-color);
      box-shadow: 0 0 24px rgba(15, 23, 42, 0.04);
    }

    .search {
      padding-top: 1rem;
      border-bottom: 1px solid var(--sidebar-border-color);
    }

    .search input {
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 0.75rem 0.9rem;
    }

    .markdown-section {
      max-width: 1120px;
      padding-bottom: 5rem;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      color: var(--heading-color);
    }

    .markdown-section a {
      font-weight: 600;
    }

    .markdown-section .go-hero {
      padding: 1.5rem;
      border: 1px solid #dbe4ee;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.08), rgba(255, 255, 255, 0.98) 46%, rgba(234, 88, 12, 0.08));
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.06);
      margin-bottom: 1.75rem;
    }

    .markdown-section .go-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0 2rem;
    }

    .markdown-section .go-card {
      padding: 1.15rem;
      border: 1px solid #dbe4ee;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(241, 245, 249, 0.95));
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.05);
    }

    .markdown-section .go-card h3 {
      margin-top: 0;
      margin-bottom: 0.55rem;
    }

    .markdown-section .go-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 0.9rem 0 0;
    }

    .markdown-section .go-chip {
      display: inline-flex;
      align-items: center;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: #ecfeff;
      color: #0f766e;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .markdown-section .go-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .markdown-section .go-button {
      display: inline-block;
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: 1px solid #99f6e4;
      color: #115e59;
      background: rgba(236, 254, 255, 0.9);
      text-decoration: none;
      font-weight: 700;
    }

    .markdown-section .go-button:hover {
      text-decoration: none;
      background: #ccfbf1;
    }

    @media screen and (min-width: 769px) {
      .sidebar {
        width: var(--sidebar-width);
      }

      .content {
        left: var(--sidebar-width);
      }
    }
  </style>
</head>
<body>
  <div id="app">Loading whitepapers...</div>
  <script>
    function normalizeDocPath(path) {
      var normalized = path || "/README.md";
      normalized = normalized.split("?")[0].split("#")[0];

      if (!normalized.startsWith("/")) {
        normalized = "/" + normalized;
      }

      if (!/\.md$/i.test(normalized)) {
        if (!normalized.endsWith("/")) {
          normalized += "/";
        }
        normalized += "README.md";
      }

      return normalized.replace(/\/+/g, "/");
    }

    function currentFileFromRoute(vm) {
      var current = vm.route && (vm.route.file || vm.route.path) ? (vm.route.file || vm.route.path) : "/README.md";
      return normalizeDocPath(current);
    }

    function resolveLocalDocLink(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (
        rawHref.startsWith("#") ||
        rawHref.startsWith("mailto:") ||
        rawHref.startsWith("tel:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawHref)
      ) {
        return null;
      }

      var parts = rawHref.split("#", 2);
      var pathPart = parts[0];
      var anchorPart = parts.length > 1 ? parts[1] : "";

      if (!pathPart) {
        return null;
      }

      if (/\.(png|svg|jpe?g|gif|webp|avif|pdf)$/i.test(pathPart)) {
        return null;
      }

      if (!/\.md$/i.test(pathPart)) {
        if (/\/$/.test(pathPart)) {
          pathPart += "README.md";
        } else if (!/\.[a-z0-9]+$/i.test(pathPart)) {
          pathPart += "/README.md";
        } else {
          return null;
        }
      }

      var currentDir = currentFile.replace(/[^/]*$/, "");
      var resolved = new URL(pathPart, "https://graiphic.local" + currentDir).pathname.replace(/\/+/g, "/");
      var docsifyHref = "#" + resolved;

      if (anchorPart) {
        docsifyHref += "?id=" + encodeURIComponent(anchorPart);
      }

      return docsifyHref;
    }

    function resolveLocalAssetUrl(rawUrl, currentFile) {
      if (!rawUrl) {
        return null;
      }

      if (
        rawUrl.startsWith("#") ||
        rawUrl.startsWith("data:") ||
        rawUrl.startsWith("blob:") ||
        /^(?:[a-z]+:)?\/\//i.test(rawUrl)
      ) {
        return null;
      }

      var currentDir = currentFile.replace(/[^/]*$/, "");
      var resolvedPath = new URL(rawUrl, "https://graiphic.local" + currentDir).pathname.replace(/\/+/g, "/");
      return new URL(resolvedPath.replace(/^\//, ""), window.location.href.split("#")[0]).href;
    }

    function resolveLocalAssetHref(rawHref, currentFile) {
      if (!rawHref) {
        return null;
      }

      if (/^(?:[a-z]+:)?\/\//i.test(rawHref) || rawHref.startsWith("mailto:") || rawHref.startsWith("tel:")) {
        return null;
      }

      var candidate = rawHref;

      if (candidate.startsWith("#/")) {
        candidate = candidate.slice(2);
      } else if (candidate.startsWith("#")) {
        return null;
      }

      candidate = candidate.split("?")[0].split("#")[0];

      if (!/\.(pdf|png|svg|jpe?g|gif|webp|avif)$/i.test(candidate)) {
        return null;
      }

      return resolveLocalAssetUrl(candidate, currentFile);
    }

    window.$docsify = {
      name: "Graiphic GO Whitepapers",
      repo: "Graiphic/GO-Whitepapers",
      homepage: "README.md",
      loadSidebar: true,
      loadNavbar: true,
      auto2top: true,
      subMaxLevel: 2,
      maxLevel: 3,
      relativePath: false,
      alias: {
        "/.*/_sidebar.md": "/_sidebar.md",
        "/.*/_navbar.md": "/_navbar.md"
      },
      search: {
        placeholder: "Search whitepapers",
        noData: "No matching section found.",
        depth: 3
      },
      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (markdown) {
            var currentFile = currentFileFromRoute(vm);

            return markdown.replace(
              /(<img\b[^>]*\bsrc=["'])([^"']+)(["'][^>]*>)/gi,
              function (match, prefix, rawSrc, suffix) {
                var rewrittenSrc = resolveLocalAssetUrl(rawSrc, currentFile);
                if (!rewrittenSrc) {
                  return match;
                }
                return prefix + rewrittenSrc + suffix;
              }
            );
          });

          hook.doneEach(function () {
            var currentFile = currentFileFromRoute(vm);

            document.querySelectorAll(".markdown-section a[href], .cover-main a[href], .app-nav a[href], .sidebar-nav a[href]").forEach(function (anchor) {
              var rawHref = anchor.getAttribute("href");
              var rewrittenAssetHref = resolveLocalAssetHref(rawHref, currentFile);
              if (rewrittenAssetHref) {
                anchor.setAttribute("href", rewrittenAssetHref);
                if (/\.pdf$/i.test(rewrittenAssetHref)) {
                  anchor.setAttribute("target", "_blank");
                  anchor.setAttribute("rel", "noopener noreferrer");
                }
                return;
              }

              var rewrittenHref = resolveLocalDocLink(rawHref, currentFile);
              if (rewrittenHref) {
                anchor.setAttribute("href", rewrittenHref);
              }
            });

            document.querySelectorAll(".markdown-section img[src]").forEach(function (image) {
              var rawSrc = image.getAttribute("src");
              var rewrittenSrc = resolveLocalAssetUrl(rawSrc, currentFile);
              if (rewrittenSrc) {
                image.setAttribute("src", rewrittenSrc);
              }
            });
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
